model_seed: 42

config_name: "default"

defaults:
  - data: mod

mode: "train"
# mode: "eval"

# Model configuration
model:
  type: 'nanogpt'
  max_seq_len: 128
  sequence_len: 128
  emb_dropout: 0
  vocab_size: -1 # Note: this can be set in `train.py`
  dim: 256
  depth: 1
  heads: 8
  layer_dropout: 0
  qk_norm: 'rms_mininum'
  ## Added for nanogpt
  n_kv_head: 8
  window_pattern: "SSSL"
  # nanogpt:
  #   vocab_size: 3
  #   n_layer: 12
  #   n_head: int = 6 # number of query heads
  #   n_kv_head: int = 6 # number of key/value heads (GQA)
  #   n_embd: int = 768
  #   # Sliding window attention pattern string, tiled across layers. Final layer always L.
  #   # Characters: L=long (full context), S=short (half context)
  #   # Examples: "L"=all full context, "SL"=alternating, "SSL"=two short then one long
  #   window_pattern: str = "SSSL"
  #   qk_norm: str = 'rms_mininum'

  # the following are not used
  use_conv1d_embed: 0
  conv1d_embed:
    kernel_size: 5
    num_layers: 1
  load_ckpt: 0
  ckpt_path: ""

# Data configuration
data:
  task: flipflop
  length: 128
  random_length: 0
  seed: 42
  n_states: 2
  # the probability of ignores; comma-separated for a mixture.
  p_ignores_train: '0.5'
  p_ignores_val: '0.5'
  # the number of ignores in a sequence
  n_ignores_train: '' # NOTE: this overwrites p_ignores
  n_ignores_val: '' # NOTE: this overwrites p_ignores
  # number of samples (in an "epoch")
  n_samples_train: 819200
  n_samples_val: 8192
  # the file to load the data from; overwrites all other settings
  fdata_train: ''
  fdata_val: ''
  batch_size: 128
  eval_batch_size: 512
  num_workers: 8

# Training configuration
training:
  lr: 1e-4
  lr_schedule: cosine  # 'cosine' or 'none'
  scheduler_eta_min: 0.0  # min LR for cosine schedule
  weight_decay: 0
  epochs: 1
  steps: -1 # NOTE: currently unused
  n_steps_to_eval: 100
  n_steps_to_save: 1000
  weight_by_ignores: 0

# Wandb configuration
wandb:
  project: "flipflop2025"
  name: ""
  entity: 'bingbin'  # Set this to your wandb username 