hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - config_name=
    - model_seed=1
    - data.seed=1
    - data.n_states=2
    - data.length=64
    - data.n_samples_train=1024000
    - data.n_samples_val=2048
    - data.p_ignores_train=
    - data.p_ignores_val=
    - data.n_ignores_train='1;60'
    - data.n_ignores_val='1;20;36;50;63'
    - data.fdata_train=
    - data.fdata_val=
    - model.D=256
    - model.L=1
    - model.M=1024
    - model.H=1
    - model.K=256
    - training.epochs=1
    - training.lr=1e-3
    - training.lr_schedule=constant
    - training.weight_decay=0
    - training.n_steps_to_eval=1000
    - training.weight_by_ignores=1
    - wandb.name=_1
    - wandb.entity=bingbin
    - wandb.project=flipflop2025
  job:
    name: train
    chdir: null
    override_dirname: config_name=,data.fdata_train=,data.fdata_val=,data.length=64,data.n_ignores_train='1;60',data.n_ignores_val='1;20;36;50;63',data.n_samples_train=1024000,data.n_samples_val=2048,data.n_states=2,data.p_ignores_train=,data.p_ignores_val=,data.seed=1,model.D=256,model.H=1,model.K=256,model.L=1,model.M=1024,model_seed=1,training.epochs=1,training.lr=1e-3,training.lr_schedule=constant,training.n_steps_to_eval=1000,training.weight_by_ignores=1,training.weight_decay=0,wandb.entity=bingbin,wandb.name=_1,wandb.project=flipflop2025
    id: ???
    num: ???
    config_name: default.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /n/home08/bingbin/flipflop/jax
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /n/home08/bingbin/flipflop/jax/config
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /n/home08/bingbin/flipflop/jax/outputs/2026-03-10/17-26-40
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
